collections:
  - name: 'pages'
    label: 'Páginas'
    folder: 'src/content/pages'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Título', name: 'title', widget: 'string', required: false }
      - label: 'Sessões'
        name: 'sessions'
        widget: 'list'
        required: false
        fields:
          - label: 'Sessão'
            name: 'session'
            widget: 'string'
            required: true
