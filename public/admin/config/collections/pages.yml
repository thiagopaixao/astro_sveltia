collections:
  - name: 'pages'
    label: 'Páginas'
    folder: 'src/content/pages'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Título', name: 'title', widget: 'string', required: false }
      - label: 'Sessões'
        name: 'sessions'
        widget: 'list'
        required: false
        fields:
          - label: 'Sessão'
            name: 'session'
            widget: 'object'
            fields:
              - { label: 'ID', name: 'id', widget: 'string', required: true }
              - label: 'Components'
                name: 'components'
                widget: 'list'
                required: false
                types:
                  - *group
                  - *cta
                  - *map

