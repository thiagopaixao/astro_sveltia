collections:
  - name: 'pages'
    label: 'Páginas'
    folder: 'src/content/pages'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Título', name: 'title', widget: 'string', required: false }
      - label: 'Sessão'
        name: 'sessions'
        widget: 'object'
        required: false
        fields:
          - { label: 'ID', name: 'session', widget: 'string', required: true }
          - label: 'Components'
            name: 'components'
            widget: 'list'
            required: false
            types:
              - *group
              - *cta
              - *map

