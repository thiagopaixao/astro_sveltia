backend:
  name: github
  repo: thiagopaixao/teste_astro_leaflet
  branch: main

media_folder: 'public/uploads'
public_folder: '/uploads'

local_backend: true

collections:
  - name: 'pages'
    label: 'Páginas'
    folder: 'src/content/pages'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Título', name: 'title', widget: 'string', required: false }
      - label: 'Componentes'
        name: 'components'
        widget: 'list'
        collapsed: true
        required: false
        types:
          - label: 'Group'
            name: 'group'
            widget: 'object'
            collapsed: true
            summary: 'Group - {{fields.title}}'
            fields:
              - {
                  label: 'Tipo',
                  name: 'type',
                  widget: 'hidden',
                  default: 'Group',
                }
              - {
                  label: 'Layout',
                  name: 'layout',
                  widget: 'select',
                  options: ['default', 'media', 'text', 'text-bigger'],
                  default: 'default',
                }
              - {
                  label: 'Cor do Texto',
                  name: 'txtColor',
                  widget: 'color',
                  enableAlpha: true,
                  allowInput: true,
                  default: '#000000',
                  required: false,
                }
              - {
                  label: 'Cor de Fundo',
                  name: 'bgColor',
                  widget: 'color',
                  enableAlpha: true,
                  allowInput: true,
                  default: '#FFFFFF',
                  required: false,
                }
              - {
                  label: 'Imagem de Fundo',
                  name: 'backgroundImage',
                  widget: 'image',
                  required: false,
                }
              - {
                  label: 'Overlay',
                  name: 'overlay',
                  widget: 'select',
                  options: ['none', 'light', 'dark'],
                  default: 'none',
                  required: false,
                }
              - {
                  label: 'Padding Superior',
                  name: 'paddingTop',
                  widget: 'boolean',
                  default: false,
                }
              - {
                  label: 'Padding Inferior',
                  name: 'paddingBottom',
                  widget: 'boolean',
                  default: false,
                }
              - label: 'Componentes Filhos'
                name: 'components'
                widget: 'list'
                collapsed: true
                required: false
                types:
                  - label: 'Group'
                    name: 'group'
                    widget: 'object'
                    collapsed: true
                    summary: 'Group - {{fields.title}}'
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'Group',
                        }
                      - {
                          label: 'Layout',
                          name: 'layout',
                          widget: 'select',
                          options: ['default', 'media', 'text', 'text-bigger'],
                          default: 'default',
                        }
                      - {
                          label: 'Cor do Texto',
                          name: 'txtColor',
                          widget: 'color',
                          enableAlpha: true,
                          allowInput: true,
                          default: '#000000',
                          required: false,
                        }
                      - {
                          label: 'Cor de Fundo',
                          name: 'bgColor',
                          widget: 'color',
                          enableAlpha: true,
                          allowInput: true,
                          default: '#FFFFFF',
                          required: false,
                        }
                      - {
                          label: 'Imagem de Fundo',
                          name: 'backgroundImage',
                          widget: 'image',
                          required: false,
                        }
                      - {
                          label: 'Overlay',
                          name: 'overlay',
                          widget: 'select',
                          options: ['none', 'light', 'dark'],
                          default: 'none',
                          required: false,
                        }
                      - {
                          label: 'Padding Superior',
                          name: 'paddingTop',
                          widget: 'boolean',
                          default: false,
                        }
                      - {
                          label: 'Padding Inferior',
                          name: 'paddingBottom',
                          widget: 'boolean',
                          default: false,
                        }
                      - label: 'Componentes Filhos'
                        name: 'components'
                        widget: 'list'
                        collapsed: true
                        required: false
                        types:
                          - label: 'Group'
                            name: 'group'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'Group',
                                }
                          - label: 'CTA'
                            name: 'cta'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'Cta',
                                }
                          - label: 'Text'
                            name: 'text'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'Text',
                                }
                              - {
                                  label: 'Conteúdo',
                                  name: 'content',
                                  widget: 'markdown',
                                  required: false,
                                }
                          - label: 'CardsCall'
                            name: 'cardscall'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'CardsCall',
                                }
                              - label: 'Cards'
                                name: 'cardsCallArr'
                                widget: 'list'
                                fields:
                                  - label: 'Link'
                                    name: 'link'
                                    widget: 'object'
                                    required: false
                                    fields:
                                      - { label: 'URL', name: 'url', widget: 'string' }
                                  - label: 'Imagem'
                                    name: 'img'
                                    widget: 'object'
                                    required: false
                                    fields:
                                      - { label: 'Fonte', name: 'src', widget: 'image' }
                                  - { label: 'Título', name: 'title', widget: 'string', required: false }
                                  - { label: 'Texto', name: 'text', widget: 'text', required: false }
                          - label: 'ChartBar'
                            name: 'chartbar'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'ChartBar',
                                }
                              - { label: 'Título do Gráfico', name: 'chartTitle', widget: 'string', required: false }
                              - { label: 'Notas do Gráfico', name: 'chartNotes', widget: 'text', required: false }
                              - label: 'Barras'
                                name: 'chartBars'
                                widget: 'list'
                                fields:
                                  - { label: 'Rótulo', name: 'label', widget: 'string' }
                                  - { label: 'Valor', name: 'value', widget: 'number' }
                                  - { label: 'Cor', name: 'color', widget: 'color', required: false }
                          - label: 'ImageBlock'
                            name: 'imageblock'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'ImageBlock',
                                }
                              - { label: 'Fonte', name: 'src', widget: 'image' }
                              - { label: 'Texto Alternativo', name: 'alt', widget: 'string', required: false }
                              - { label: 'Largura Total', name: 'wide', widget: 'boolean', default: false }
                              - { label: 'Descrição', name: 'description', widget: 'text', required: false }
                          - label: 'LogosGroup'
                            name: 'logosgroup'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'LogosGroup',
                                }
                              - label: 'Logos'
                                name: 'logos'
                                widget: 'list'
                                fields:
                                  - { label: 'Imagem', name: 'image', widget: 'image' }
                                  - label: 'Link'
                                    name: 'link'
                                    widget: 'object'
                                    fields:
                                      - { label: 'URL', name: 'url', widget: 'string' }
                                      - { label: 'Target', name: 'target', widget: 'string', required: false }
                                      - { label: 'Texto', name: 'text', widget: 'string', required: false }
                                      - { label: 'Título', name: 'title', widget: 'string', required: false }
                          - label: 'VideoEmbed' 
                            name: 'videoembed'
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'VideoEmbed',
                                }
                              - { label: 'URL do Vídeo', name: 'videoUrl', widget: 'string' }
                              - { label: 'Legenda', name: 'videoCaption', widget: 'string', required: false }
                              - { label: 'Largura Total', name: 'wide', widget: 'boolean', default: false }
                          - label: 'InnerColumns'
                            name: 'innercolumns' 
                            widget: 'object'
                            collapsed: true
                            fields:
                              - {
                                  label: 'Tipo',
                                  name: 'type',
                                  widget: 'hidden',
                                  default: 'InnerColumns',
                                }
                              - { label: 'Coluna 1', name: 'column1', widget: 'markdown' }
                              - { label: 'Coluna 2', name: 'column2', widget: 'markdown' }

          - label: 'CTA'
            name: 'cta'
            widget: 'object'
            collapsed: true
            summary: 'CTA - {{fields.title}}'
            fields:
              - {
                  label: 'Tipo',
                  name: 'type',
                  widget: 'hidden',
                  default: 'Cta',
                }
              - {
                  label: 'Layout',
                  name: 'layout',
                  widget: 'select',
                  options: ['media', 'text'],
                  default: 'text',
                }
              - {
                  label: 'Cor do Texto',
                  name: 'txtColor',
                  widget: 'color',
                  enableAlpha: true,
                  allowInput: true,
                  default: '#000000',
                  required: false,
                }
              - {
                  label: 'Cor de Fundo',
                  name: 'bgColor',
                  widget: 'color',
                  enableAlpha: true,
                  allowInput: true,
                  default: '#FFFFFF',
                  required: false,
                }
              - {
                  label: 'Texto Destacado',
                  name: 'highlightedText',
                  widget: 'string',
                  required: false,
                }
              - {
                  label: 'Mídia',
                  name: 'media',
                  widget: 'image',
                  required: false,
                }
              - {
                  label: 'Tipo de Mídia',
                  name: 'mediaType',
                  widget: 'select',
                  options: ['image', 'video'],
                  default: 'image',
                  required: false,
                }
              - {
                  label: 'Texto do CTA',
                  name: 'ctaText',
                  widget: 'markdown',
                  required: false,
                }
              - label: 'Link'
                name: 'link'
                widget: 'object'
                required: false
                fields:
                  - { label: 'URL', name: 'url', widget: 'string' }
                  - {
                      label: 'Target',
                      name: 'target',
                      widget: 'select',
                      options: ['_self', '_blank'],
                      default: '_self',
                    }
                  - { label: 'Texto', name: 'text', widget: 'string' }
              - {
                  label: 'Imagem de Fundo',
                  name: 'imgBg',
                  widget: 'image',
                  required: false,
                }
              - {
                  label: 'Vídeo de Fundo',
                  name: 'videoBg',
                  widget: 'string',
                  required: false,
                }
              - label: 'Componentes Filhos'
                name: 'components'
                widget: 'list'
                collapsed: true
                required: false
                types:
                  - label: 'Group'
                    name: 'group'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'Group',
                        }
                  - label: 'CTA'
                    name: 'cta'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'Cta',
                        }
                  - label: 'Text'
                    name: 'text'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'Text',
                        }
                      - {
                          label: 'Conteúdo',
                          name: 'content',
                          widget: 'markdown',
                          required: false,
                        }
                  - label: 'CardsCall'
                    name: 'cardscall'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'CardsCall',
                        }
                      - label: 'Cards'
                        name: 'cardsCallArr'
                        widget: 'list'
                        fields:
                          - label: 'Link'
                            name: 'link'
                            widget: 'object'
                            required: false
                            fields:
                              - { label: 'URL', name: 'url', widget: 'string' }
                          - label: 'Imagem'
                            name: 'img'
                            widget: 'object'
                            required: false
                            fields:
                              - { label: 'Fonte', name: 'src', widget: 'image' }
                          - { label: 'Título', name: 'title', widget: 'string', required: false }
                          - { label: 'Texto', name: 'text', widget: 'text', required: false }
                  - label: 'ChartBar'
                    name: 'chartbar'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'ChartBar',
                        }
                      - { label: 'Título do Gráfico', name: 'chartTitle', widget: 'string', required: false }
                      - { label: 'Notas do Gráfico', name: 'chartNotes', widget: 'text', required: false }
                      - label: 'Barras'
                        name: 'chartBars'
                        widget: 'list'
                        fields:
                          - { label: 'Rótulo', name: 'label', widget: 'string' }
                          - { label: 'Valor', name: 'value', widget: 'number' }
                          - { label: 'Cor', name: 'color', widget: 'color', required: false }
                  - label: 'ImageBlock'
                    name: 'imageblock'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'ImageBlock',
                        }
                      - { label: 'Fonte', name: 'src', widget: 'image' }
                      - { label: 'Texto Alternativo', name: 'alt', widget: 'string', required: false }
                      - { label: 'Largura Total', name: 'wide', widget: 'boolean', default: false }
                      - { label: 'Descrição', name: 'description', widget: 'text', required: false }
                  - label: 'LogosGroup'
                    name: 'logosgroup'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'LogosGroup',
                        }
                      - label: 'Logos'
                        name: 'logos'
                        widget: 'list'
                        fields:
                          - { label: 'Imagem', name: 'image', widget: 'image' }
                          - label: 'Link'
                            name: 'link'
                            widget: 'object'
                            fields:
                              - { label: 'URL', name: 'url', widget: 'string' }
                              - { label: 'Target', name: 'target', widget: 'string', required: false }
                              - { label: 'Texto', name: 'text', widget: 'string', required: false }
                              - { label: 'Título', name: 'title', widget: 'string', required: false }
                  - label: 'VideoEmbed'
                    name: 'videoembed'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'VideoEmbed',
                        }
                      - { label: 'URL do Vídeo', name: 'videoUrl', widget: 'string' }
                      - { label: 'Legenda', name: 'videoCaption', widget: 'string', required: false }
                      - { label: 'Largura Total', name: 'wide', widget: 'boolean', default: false }
                  - label: 'InnerColumns'
                    name: 'innercolumns'
                    widget: 'object'
                    collapsed: true
                    fields:
                      - {
                          label: 'Tipo',
                          name: 'type',
                          widget: 'hidden',
                          default: 'InnerColumns',
                        }
                      - { label: 'Coluna 1', name: 'column1', widget: 'markdown' }
                      - { label: 'Coluna 2', name: 'column2', widget: 'markdown' }
